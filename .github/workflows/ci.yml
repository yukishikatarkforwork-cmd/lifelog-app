name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同じブランチで新しい push があったら古い実行をキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint / Test / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # 本番ビルド。Supabase の値が無くてもビルドは通る（実行時に設定案内を表示する設計）。
      - name: Build
        run: npm run build
